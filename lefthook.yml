pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.rs"
      run: cargo fmt && git add -u -- "*.rs"
    clippy:
      glob: "*.rs"
      run: cargo clippy -- -D warnings

pre-push:
  commands:
    test:
      run: cargo test

commit-msg:
  commands:
    conventional:
      run: |
        msg=$(head -1 {1})
        if ! echo "$msg" | grep -qE '^(feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert)\(.+\):'; then
          echo "Commit message must follow: type(scope): subject"
          exit 1
        fi
